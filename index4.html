<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업 일정 계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            padding: 30px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        #customHolidaysList {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
        }

        .custom-holiday-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px dashed #e9ecef;
            font-size: 14px;
        }

        .custom-holiday-item:last-child {
            border-bottom: none;
        }

        .custom-holiday-item button {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 16px;
            padding: 0 5px;
            line-height: 1;
        }

        .result-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .result-section h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .result-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-item label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .result-item .value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .period-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .period-section h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .period-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #764ba2;
        }

        .period-item h4 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .period-item .period-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .period-info-item {
            font-size: 13px;
        }

        .period-info-item strong {
            display: block;
            color: #666;
            font-size: 11px;
            margin-bottom: 3px;
        }

        .period-info-item span {
            color: #333;
            font-weight: 600;
        }

        .calendar-section {
            padding: 10px;
        }

        .calendar-month {
            margin-bottom: 30px;
        }

        .calendar-month h4 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .calendar-header {
            text-align: center;
            font-weight: 600;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        .calendar-header.sat {
            color: #0066cc;
        }

        .calendar-header.sun {
            color: #dc3545;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 5px;
            font-size: 14px;
            position: relative;
        }

        .calendar-day.empty {
            border: none;
        }

        .calendar-day.weekend {
            background: #f0f0f0;
        }

        .calendar-day.sat {
            color: #0066cc;
        }

        .calendar-day.sun,
        .calendar-day.holiday {
            color: #dc3545;
        }

        .calendar-day.class-day {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }

        .calendar-day.start-day {
            background: #28a745;
            color: white;
            font-weight: 600;
        }

        .calendar-day.end-day {
            background: #dc3545;
            color: white;
            font-weight: 600;
        }

        .calendar-day.custom-holiday {
            background: #ffc107;
        }

        .holiday-name {
            font-size: 9px;
            text-align: center;
            margin-top: 2px;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .saved-courses {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .saved-courses h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .course-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }

        .course-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .course-item h4 {
            margin-bottom: 5px;
            color: #333;
        }

        .course-item p {
            font-size: 12px;
            color: #666;
            margin: 3px 0;
        }

        .course-item button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }

        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📚 수업 일정 계산기</h1>
            <p>주말과 공휴일을 제외한 정확한 수업 종료일 및 훈련비를 계산합니다</p>
        </div>

        <div class="content">
            <div>
                <div class="input-section">
                    <h3 style="margin-bottom: 20px;">일정 및 훈련비 설정</h3>

                    <div class="input-group" style="display: flex; gap: 10px; align-items: flex-end;">
                        <div style="flex-grow: 1;">
                            <label>과정선택</label>
                            <select id="courseName" onchange="applyTemplate()" style="margin-bottom: 0;">
                                <option value="">과정을 선택하세요</option>
                            </select>
                        </div>
                        <button class="btn btn-secondary" onclick="openTemplateModal()"
                            style="width: auto; margin-bottom: 0; background: #667eea; border-color: #667eea;">과정정보
                            입력</button>
                    </div>

                    <div class="input-group">
                        <label>시작 날짜</label>
                        <input type="date" id="startDate">
                    </div>

                    <div class="input-group"
                        style="padding: 15px; background: #eef2f3; border-radius: 8px; border-left: 4px solid #764ba2; margin-bottom: 20px;">
                        <label style="color: #764ba2; font-weight: bold; margin-bottom: 10px;">일정 이름 (저장 및 불러오기)</label>
                        <input type="text" id="scheduleName" list="savedSchedulesList" oninput="onScheduleNameInput()"
                            placeholder="새로운 텍스트를 입력하거나 누르면 목록이 나옵니다" autocomplete="off" style="margin-bottom: 10px;">
                        <datalist id="savedSchedulesList"></datalist>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-success" onclick="saveCourse()" style="flex: 1; margin-bottom: 0;">일정
                                저장하기</button>
                            <button class="btn btn-secondary" onclick="deleteSelectedCourse()"
                                style="flex: 1; margin-bottom: 0; background: #dc3545; border-color: #dc3545;">일정
                                삭제</button>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <button class="btn btn-primary" onclick="calculate()"
                            style="flex: 1; margin-bottom: 0;">계산하기</button>
                        <button class="btn btn-secondary" onclick="clearForm()"
                            style="width: auto; padding: 0 20px; margin-bottom: 0;">초기화</button>
                    </div>

                    <div class="input-group">
                        <label>1일 수업시간 (시간)</label>
                        <input type="number" id="dailyHours" min="1" max="24" value="8">
                    </div>

                    <div class="input-group">
                        <label>총 수업시간 (시간)</label>
                        <input type="number" id="totalHours" min="1" value="100">
                    </div>

                    <div class="input-group">
                        <label>시간당 훈련비 (원)</label>
                        <select id="trainingFee">
                            <option value="18150">18,150원</option>
                            <option value="14580">14,580원</option>
                            <option value="9477">9,477원</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>교육생 수 (명)</label>
                        <input type="number" id="traineeCount" min="1" value="20">
                    </div>

                    <div class="input-group">
                        <label>추가 휴강 (주말/공휴일 외)</label>
                        <input type="date" id="newCustomHolidayDate" style="margin-bottom: 5px;">
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="newCustomHolidayName" placeholder="일정명 (예: 워크숍)"
                                style="flex: 8; margin-bottom: 0;">
                            <button class="btn btn-secondary" onclick="addCustomHoliday()"
                                style="flex: 2; margin-top: 0; margin-bottom: 0; padding: 10px;">추가</button>
                        </div>
                    </div>

                    <!-- 휴강 리스트 복원 -->
                    <div id="customHolidaysList"></div>
                </div>
            </div>

            <div>
                <div class="result-section" id="resultSection" style="display: none;">
                    <h3 id="resultTitle">📊 계산 결과</h3>
                    <div class="result-grid">
                        <div class="result-item">
                            <label>시작일</label>
                            <div class="value" id="resultStartDate">-</div>
                        </div>
                        <div class="result-item">
                            <label>종료일</label>
                            <div class="value" id="resultEndDate">-</div>
                        </div>
                        <div class="result-item">
                            <label>전체 기간</label>
                            <div class="value" id="resultTotalDays">-</div>
                        </div>
                        <div class="result-item">
                            <label>실제 수업일</label>
                            <div class="value" id="resultClassDays">-</div>
                        </div>
                        <div class="result-item">
                            <label>제외된 주말</label>
                            <div class="value" id="resultWeekends">-</div>
                        </div>
                        <div class="result-item">
                            <label>제외된 공휴일</label>
                            <div class="value" id="resultHolidays">-</div>
                        </div>
                        <div class="result-item" style="border-left-color: #d81b60;">
                            <label>총합계 훈련비 예상</label>
                            <div class="value" id="resultTotalFee" style="color: #d81b60;">-</div>
                        </div>
                    </div>
                </div>

                <div class="period-section" id="periodSection" style="display: none;">
                    <h3 id="periodTitle">📅 차수별 교육 기간 및 훈련비</h3>
                    <div id="periodList"></div>
                </div>

                <div class="legend" id="legend" style="display: none;">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #28a745;"></div>
                        <span>시작일</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #dc3545;"></div>
                        <span>종료일</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color"
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        </div>
                        <span>수업일</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #ffc107;"></div>
                        <span>추가 휴강</span>
                    </div>
                </div>

                <div class="calendar-section" id="calendarSection"></div>
            </div>
        </div>
    </div>

        function loadSelectedCourseData(course) {
            const courseNameSelect = document.getElementById('courseName');
            let found = false;
            for (let i = 0; i < courseNameSelect.options.length; i++) {
                // courseName 필드가 저장된 원본 템플릿 이름
                if (courseNameSelect.options[i].textContent === course.courseName) {
                    courseNameSelect.selectedIndex = i;
                    found = true;
                    break;
                }
            }
            if (!found && course.courseName) {
                const opt = document.createElement('option');
                opt.value = '-1';
                opt.textContent = course.courseName;
                courseNameSelect.appendChild(opt);
                courseNameSelect.selectedIndex = courseNameSelect.options.length - 1;
            }

            if (course.startDate) document.getElementById('startDate').value = course.startDate;
            document.getElementById('dailyHours').value = course.dailyHours;
            document.getElementById('totalHours').value = course.totalHours;

            const tfObj = document.getElementById('trainingFee');
            if (course.trainingFee && Array.from(tfObj.options).some(opt => String(opt.value) === String(course.trainingFee))) {
                tfObj.value = course.trainingFee;
            }
            if (course.traineeCount) document.getElementById('traineeCount').value = course.traineeCount;

            customHolidays = course.customHolidays || [];
            saveCustomHolidays();

            calculate();

        function isWeekend(date) {
            const day = date.getDay();
            return day === 0 || day === 6;
        }

        function isHoliday(dateStr) {
            return officialHolidays[dateStr] || customHolidays.some(h => h.date === dateStr);
        }

        function getHolidayName(dateStr) {
            if (officialHolidays[dateStr]) return officialHolidays[dateStr];
            const customHoliday = customHolidays.find(h => h.date === dateStr);
            if (customHoliday) return customHoliday.name;
            return null;
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function addOneMonth(date) {
            const newDate = new Date(date);
            newDate.setMonth(newDate.getMonth() + 1);
            newDate.setDate(newDate.getDate() - 1);
            return newDate;
        }

        function calculate() {
            const startDateInput = document.getElementById('startDate').value;
            const dailyHours = parseInt(document.getElementById('dailyHours').value);
            const totalHours = parseInt(document.getElementById('totalHours').value);
            const trainingFee = parseInt(document.getElementById('trainingFee').value);
            const traineeCount = parseInt(document.getElementById('traineeCount').value);

            const selectObj = document.getElementById('courseName');
            const courseName = selectObj.selectedIndex > 0 ? selectObj.options[selectObj.selectedIndex].textContent : '';

            if (!startDateInput || !dailyHours || !totalHours || !trainingFee || !traineeCount) {
                alert('모든 필수 항목을 입력해주세요.');
                return;
            }

            const requiredDays = Math.ceil(totalHours / dailyHours);
            let currentDate = new Date(startDateInput);

            let classDaysCount = 0;
            let weekendCount = 0;
            let holidayCount = 0;
            const classDates = [];

            const maxDaysCheck = 365 * 10;
            let iterationCount = 0;

            while (classDaysCount < requiredDays) {
                if (iterationCount > maxDaysCheck) {
                    alert('계산에 너무 오랜 시간이 걸립니다. 입력값을 확인해주세요.');
                    return;
                }

                const dateStr = formatDate(currentDate);
                const isWE = isWeekend(currentDate);
                const isH = isHoliday(dateStr);

                if (classDates.length === 0 && dateStr === startDateInput) {
                    if (!isWE && !isH) {
                        classDates.push(new Date(currentDate));
                        classDaysCount++;
                    } else {
                        if (isWE) weekendCount++;
                        if (isH) holidayCount++;
                    }
                } else if (classDates.length > 0 || dateStr !== startDateInput) {
                    if (!isWE && !isH) {
                        classDates.push(new Date(currentDate));
                        classDaysCount++;
                    } else {
                        if (isWE) weekendCount++;
                        if (isH) holidayCount++;
                    }
                }

                currentDate.setDate(currentDate.getDate() + 1);
                iterationCount++;
            }

            const startDate = new Date(startDateInput);
            const endDate = classDates[classDates.length - 1];
            const totalDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

            document.getElementById('resultStartDate').textContent = formatDate(startDate);
            document.getElementById('resultEndDate').textContent = formatDate(endDate);
            document.getElementById('resultTotalDays').textContent = `${totalDays}일`;
            document.getElementById('resultClassDays').textContent = `${classDaysCount}일`;
            document.getElementById('resultWeekends').textContent = `${weekendCount}일`;
            document.getElementById('resultHolidays').textContent = `${holidayCount}일`;

            const totalFee = totalHours * traineeCount * trainingFee;
            document.getElementById('resultTotalFee').textContent = `${totalFee.toLocaleString()}원`;

            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('legend').style.display = 'flex';

            const resultTitle = courseName ? `📊 ${courseName} - 계산 결과` : '📊 계산 결과';
            document.getElementById('resultTitle').textContent = resultTitle;

            const periodTitle = courseName ? `📅 ${courseName} - 차수별 교육 기간 및 훈련비` : '📅 차수별 교육 기간 및 훈련비';
            document.getElementById('periodTitle').textContent = periodTitle;

            calculatePeriods(startDate, classDates, dailyHours, trainingFee, traineeCount);
            generateCalendar(startDate, endDate, classDates);
        }

        function calculatePeriods(startDate, classDates, dailyHours, trainingFee, traineeCount) {
            const totalHours = parseInt(document.getElementById('totalHours').value);
            const periods = [];
            let currentPeriodStart = new Date(startDate);
            let periodNumber = 1;
            let classDateIndex = 0;
            let accumulatedHours = 0;

            while (classDateIndex < classDates.length && accumulatedHours < totalHours) {
                const periodEnd = addOneMonth(currentPeriodStart);
                const periodClassDates = [];

                while (classDateIndex < classDates.length) {
                    const classDate = classDates[classDateIndex];
                    if (classDate <= periodEnd) {
                        periodClassDates.push(classDate);
                        classDateIndex++;
                    } else {
                        break;
                    }
                }

                if (periodClassDates.length > 0) {
                    const actualPeriodEnd = periodClassDates[periodClassDates.length - 1];
                    let periodHours = periodClassDates.length * dailyHours;

                    if (accumulatedHours + periodHours > totalHours) {
                        periodHours = totalHours - accumulatedHours;
                    }

                    const periodDays = Math.ceil(periodHours / dailyHours);
                    const calculatedFee = periodHours * traineeCount * trainingFee;

                    accumulatedHours += periodHours;

                    const isRemaining = (accumulatedHours >= totalHours || classDateIndex >= classDates.length) &&
                        actualPeriodEnd < periodEnd;

                    periods.push({
                        number: periodNumber,
                        startDate: formatDate(currentPeriodStart),
                        endDate: formatDate(actualPeriodEnd),
                        classDays: periodDays,
                        totalHours: periodHours,
                        fee: calculatedFee,
                        isRemaining: isRemaining
                    });
                }

                currentPeriodStart = new Date(periodEnd);
                currentPeriodStart.setDate(currentPeriodStart.getDate() + 1);
                periodNumber++;
            }

            displayPeriods(periods);
        }

        function displayPeriods(periods) {
            const periodSection = document.getElementById('periodSection');
            const periodList = document.getElementById('periodList');

            periodList.innerHTML = '';

            periods.forEach(period => {
                const periodItem = document.createElement('div');
                periodItem.className = 'period-item';

                const title = period.isRemaining ?
                    `${period.number}차 (잔여 기간)` :
                    `${period.number}차`;

                periodItem.innerHTML = `
                    <h4>${title}</h4>
                    <div class="period-info">
                        <div class="period-info-item">
                            <strong>기간</strong>
                            <span>${period.startDate} ~ ${period.endDate}</span>
                        </div>
                        <div class="period-info-item">
                            <strong>수업일수</strong>
                            <span>${period.classDays}일</span>
                        </div>
                        <div class="period-info-item">
                            <strong>교육시간</strong>
                            <span>${period.totalHours}시간</span>
                        </div>
                        <div class="period-info-item">
                            <strong>훈련비</strong>
                            <span style="color: #d81b60;">${period.fee.toLocaleString()}원</span>
                        </div>
                    </div>
                `;

                periodList.appendChild(periodItem);
            });

            periodSection.style.display = 'block';
        }

        function generateCalendar(startDate, endDate, classDates) {
            const calendarSection = document.getElementById('calendarSection');
            calendarSection.innerHTML = '';

            const classDateStrs = classDates.map(d => formatDate(d));
            const startDateStr = formatDate(startDate);
            const endDateStr = formatDate(endDate);

            let currentMonth = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
            const lastMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 1);

            while (currentMonth <= lastMonth) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'calendar-month';

                const monthTitle = document.createElement('h4');
                monthTitle.textContent = `${currentMonth.getFullYear()}년 ${currentMonth.getMonth() + 1}월`;
                monthDiv.appendChild(monthTitle);

                const calendarGrid = document.createElement('div');
                calendarGrid.className = 'calendar-grid';

                const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
                weekdays.forEach((day, index) => {
                    const header = document.createElement('div');
                    header.className = 'calendar-header';
                    if (index === 0) header.classList.add('sun');
                    if (index === 6) header.classList.add('sat');
                    header.textContent = day;
                    calendarGrid.appendChild(header);
                });

                const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();

                for (let i = 0; i < firstDay; i++) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'calendar-day empty';
                    calendarGrid.appendChild(emptyDiv);
                }

                const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();

                for (let day = 1; day <= daysInMonth; day++) {
                    const date = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day);
                    const dateStr = formatDate(date);
                    const dayOfWeek = date.getDay();

                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'calendar-day';

                    if (dayOfWeek === 0) dayDiv.classList.add('sun');
                    if (dayOfWeek === 6) dayDiv.classList.add('sat');
                    if (isWeekend(date)) dayDiv.classList.add('weekend');

                    if (dateStr === startDateStr) {
                        dayDiv.classList.add('start-day');
                    } else if (dateStr === endDateStr) {
                        dayDiv.classList.add('end-day');
                    } else if (classDateStrs.includes(dateStr)) {
                        dayDiv.classList.add('class-day');
                    }

                    const holidayName = getHolidayName(dateStr);
                    if (holidayName) {
                        dayDiv.classList.add('holiday');
                        if (customHolidays.some(h => h.date === dateStr)) {
                            dayDiv.classList.add('custom-holiday');
                        }
                    }

                    dayDiv.innerHTML = `
                        <div>${day}</div>
                        ${holidayName ? `<div class="holiday-name">${holidayName}</div>` : ''}
                    `;

                    calendarGrid.appendChild(dayDiv);
                }

                monthDiv.appendChild(calendarGrid);
                calendarSection.appendChild(monthDiv);

                currentMonth.setMonth(currentMonth.getMonth() + 1);
            }
        }

            const courseName = document.getElementById('tplCourseName').value.trim();
            if (!courseName) {
                alert('삭제할 과정명을 입력하거나 선택해주세요.');
                return;
            }

            if (!confirm(`'${courseName}' 과정을 DB에서 정말 삭제하시겠습니까?`)) return;

            const btn = document.querySelector('button[onclick="deleteTemplate()"]');
            let originalText = btn ? btn.textContent : '삭제';
            if (btn) {
                btn.textContent = '삭제 중...';
                btn.disabled = true;
            }

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'delete_template', templateName: courseName })
                });

                const data = await response.json();
                if (data.success) {
                    alert('과정 정보가 성공적으로 삭제되었습니다.');
                    document.getElementById('tplCourseName').value = '';
                    closeTemplateModal();
                    await loadCoursesFromDB(); // 새로고침
                } else {
                    alert('삭제 실패: ' + (data.message || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('DB 삭제 오류: ' + error.message);
            } finally {
                if (btn) {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            }
        }
    </script>

    <!-- 과정 등록 팝업 모달 -->
    <div id="templateModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:15px; width:400px; max-width:90%;">
            <h3 style="margin-bottom: 20px; color:#667eea;">📝 과정정보 등록/수정</h3>
            <div class="input-group">
                <label>과정명 (선택 또는 입력)</label>
                <input type="text" id="tplCourseName" list="courseTemplatesList" oninput="onTemplateNameInput()"
                    placeholder="예: 웹개발 기초과정" autocomplete="off">
                <datalist id="courseTemplatesList"></datalist>
            </div>
            <div class="input-group">
                <label>1일 수업시간 (시간)</label>
                <input type="number" id="tplDailyHours" min="1" max="24" value="8">
            </div>
            <div class="input-group">
                <label>총 수업시간 (시간)</label>
                <input type="number" id="tplTotalHours" min="1" value="100">
            </div>
            <div class="input-group">
                <label>시간당 훈련비 (원)</label>
                <select id="tplTrainingFee">
                    <option value="18150">18,150원</option>
                    <option value="14580">14,580원</option>
                    <option value="9477">9,477원</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" onclick="saveTemplate()" style="flex:1; margin-bottom:0;">저장</button>
                <button class="btn btn-secondary" onclick="deleteTemplate()"
                    style="flex:1; margin-bottom:0; background: #dc3545; border-color: #dc3545;">삭제</button>
                <button class="btn btn-secondary" onclick="closeTemplateModal()"
                    style="flex:1; margin-bottom:0;">취소</button>
            </div>
        </div>
    </div>
</body>

</html>
